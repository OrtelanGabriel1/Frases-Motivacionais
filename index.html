<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Javascript -->
    <script type="text/javascript">
      
      function gerarFraseMotivacional() {
        const frases = [
    "Acredite em você e no seu potencial.",
    "Grandes conquistas começam com pequenos passos.",
    "O sucesso é a soma de pequenos esforços repetidos todos os dias.",
    "Não espere resultados diferentes se você continua fazendo as mesmas coisas.",
    "A persistência é o caminho para transformar sonhos em realidade.",
    "Cada desafio é uma oportunidade para crescer e aprender.",
    "O importante não é ser perfeito, mas continuar evoluindo.",
    "A disciplina supera a motivação quando a motivação acaba.",
    "Seu futuro é construído pelas escolhas que você faz hoje.",
    "Nunca desista de algo que pode tornar sua vida melhor."
]
      const numeroAleatorio = Math.floor(Math.random() * 10);
      const frase = frases[numeroAleatorio]
      
      document.getElementById('frase').innerHTML = frase
      }
      
    </script>

    <title>Frases motivacionais</title>

  </head>

  <body>
    
    <div class="container mt-5">
        <div class="row">
          <div class="col-md-12">

            <div class="jumbotron">
              <h1 class="text-success display-5">Frases motivacionais</h1>
              <hr>

              <h2 class="display-4" id="frase">
                Em busca do ótimo não se faz o bom.
              </h2>

              <hr>
              <button type="button" class="btn btn-success btn-lg" onclick="gerarFraseMotivacional()">Nova frase</button>
          </div>
        </div>
      </div>

  </body>

</html>
